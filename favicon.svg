<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="55%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#163322"/>
      <stop offset="100%" stop-color="#080F0B"/>
    </radialGradient>
    <radialGradient id="feather" cx="62%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6FD99B"/>
      <stop offset="100%" stop-color="#3EC87C"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Tail feathers (drawn first so body overlaps the join) -->
  <path d="M8 20 L1 16 L3 26 Z" fill="#2AA058"/>
  <path d="M8 22 L2 28 L6 22 Z" fill="#228A4A" opacity="0.7"/>

  <!-- Body -->
  <ellipse cx="16" cy="19.5" rx="9" ry="5.5"
           fill="url(#feather)"
           transform="rotate(-9 16 19.5)"/>

  <!-- Head -->
  <circle cx="21" cy="12" r="5" fill="url(#feather)"/>

  <!-- Beak -->
  <path d="M25.5 11 L31 12 L25.5 13 Z" fill="#6FD99B"/>

  <!-- Eye -->
  <circle cx="22.8" cy="11" r="1.4" fill="#080F0B"/>
  <!-- Eye highlight -->
  <circle cx="23.3" cy="10.4" r="0.45" fill="rgba(255,255,255,0.55)"/>

  <!-- Wing arc highlight -->
  <path d="M10 17.5 Q16.5 8 22.5 12"
        fill="none" stroke="#fff"
        stroke-width="1.2" stroke-linecap="round" opacity="0.18"/>
</svg>
